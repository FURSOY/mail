<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 0;
      background: #18181b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #wrapper {
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #stack {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* ── Single notification card ── */
    .card {
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      cursor: pointer;
      position: relative;
      animation: fadeIn 0.2s ease;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .card.removing {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }

    .card + .card {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .card.update {
      background: #1f1808;
    }

    .card.update + .card,
    .card + .card.update {
      border-top-color: rgba(245, 158, 11, 0.18);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar / icon */
    .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      flex-shrink: 0;
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card.update .avatar {
      background: rgba(245, 158, 11, 0.18);
      color: #fbbf24;
    }

    /* Text block */
    .text-area {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .title {
      font-size: 12.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #f4f4f5;
      line-height: 1.3;
    }

    .card.update .title {
      color: #fff7ed;
    }

    .to-line {
      font-size: 10px;
      color: #52525b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .body {
      font-size: 11px;
      color: #71717a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .card.update .body {
      color: #fcd9a8;
    }

    /* Right-side actions */
    .actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    /* Copy button */
    .code-btn {
      padding: 3px 8px;
      border: none;
      border-radius: 5px;
      background: rgba(59, 130, 246, 0.12);
      color: #60a5fa;
      font-size: 10.5px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      gap: 4px;
      align-items: center;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .code-btn:hover {
      background: rgba(59, 130, 246, 0.22);
      color: #93bbfd;
    }

    /* Close button */
    .close-btn {
      width: 18px;
      height: 18px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: #52525b;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      line-height: 1;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #d4d4d8;
    }

    /* Dismiss all bar */
    #dismissAll {
      display: none;
      justify-content: center;
      align-items: center;
      padding: 5px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      font-size: 10.5px;
      color: #52525b;
      transition: color 0.15s;
    }

    #dismissAll:hover {
      color: #a1a1aa;
    }

    #dismissAll.visible {
      display: flex;
    }

    /* Global progress bar */
    #progressBar {
      width: 100%;
      height: 2px;
      background: rgba(59, 130, 246, 0.4);
      transition: width linear;
      flex-shrink: 0;
    }

    #progressBar.update {
      background: rgba(245, 158, 11, 0.8);
    }
  </style>
</head>

<body>
  <div id="wrapper">
    <div id="stack"></div>
    <div id="progressBar"></div>
    <div id="dismissAll">Tümünü Kapat</div>
  </div>

  <script type="module">
    import { invoke } from '@tauri-apps/api/core';
    import { getCurrentWindow, LogicalSize, LogicalPosition } from '@tauri-apps/api/window';
    import { listen, emitTo } from '@tauri-apps/api/event';
    import { writeText } from '@tauri-apps/plugin-clipboard-manager';

    const win = getCurrentWindow();
    const notifications = [];
    let nextId = 0;
    let screenW = 1920, screenH = 1080;
    const WIN_W = 340;
    const BOTTOM_MARGIN = 64;

    // ── Global timer state ──
    let globalTimer = null;
    let timerStartedAt = 0;
    let timerDuration = 0;

    // ── Get screen info ──
    try {
      const info = await invoke('get_screen_info');
      screenW = info[0]; screenH = info[1];
    } catch (e) {
      console.error('[NOTIF] screen info error:', e);
    }

    // ── Resize window to fit content ──
    async function resizeWindow() {
      if (notifications.length === 0) return;

      await new Promise(r => requestAnimationFrame(r));
      const stack = document.getElementById('stack');
      const dismissAll = document.getElementById('dismissAll');
      const progressBar = document.getElementById('progressBar');
      const contentH = Math.ceil(
        stack.getBoundingClientRect().height +
        (dismissAll.classList.contains('visible') ? dismissAll.getBoundingClientRect().height : 0) +
        (progressBar.style.display === 'none' ? 0 : progressBar.getBoundingClientRect().height)
      );

      const x = screenW - WIN_W - 16;
      const y = screenH - contentH - BOTTOM_MARGIN;

      await win.setSize(new LogicalSize(WIN_W, contentH));
      await win.setPosition(new LogicalPosition(x, y));
    }

    // ── Progress bar ──
    function startProgressBar(durationMs, kind = 'mail') {
      const bar = document.getElementById('progressBar');
      bar.className = kind === 'update' ? 'update' : '';
      bar.style.transition = 'none';
      bar.style.width = '100%';
      void bar.offsetWidth;
      bar.style.transition = `width ${durationMs}ms linear`;
      bar.style.width = '0%';
    }

    // ── Global timer ──
    function extendTimer(addMs, kind = 'mail') {
      const now = Date.now();
      let remaining = 0;
      if (globalTimer) {
        const elapsed = now - timerStartedAt;
        remaining = Math.max(timerDuration - elapsed, 0);
        clearTimeout(globalTimer);
      }
      const newDuration = remaining + addMs;
      timerDuration = newDuration;
      timerStartedAt = now;
      globalTimer = setTimeout(dismissAll, newDuration);
      startProgressBar(newDuration, kind);
    }

    function clearGlobalTimer() {
      if (globalTimer) { clearTimeout(globalTimer); globalTimer = null; }
      timerDuration = 0;
      timerStartedAt = 0;
    }

    // ── Render ──
    function render() {
      const stack = document.getElementById('stack');
      stack.innerHTML = '';

      notifications.forEach((n) => {
        const card = document.createElement('div');
        card.className = `card ${n.kind === 'update' ? 'update' : ''}`;
        card.dataset.id = n.id;

        const iconSvg = n.kind === 'update'
          ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/>
             </svg>`
          : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
             </svg>`;

        const isMulti = n.kind !== 'update' && n.multiAccount;
        const avatarHtml = isMulti && n.accountPicture
          ? `<div style="width:26px;height:26px;border-radius:50%;flex-shrink:0;overflow:hidden;background:#2d2d35;">
               <img src="${escAttr(n.accountPicture)}" width="26" height="26" style="width:100%;height:100%;object-fit:cover;display:block;" alt="" />
             </div>`
          : `<div class="avatar">${iconSvg}</div>`;

        const toLineHtml = isMulti && n.accountId
          ? `<div class="to-line">to: ${esc(n.accountId)}</div>`
          : '';

        const copyBtnHtml = n.code
          ? `<button class="code-btn" data-id="${n.id}" data-code="${escAttr(n.code || '')}">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Kopyala (${esc(n.code || '')})
             </button>`
          : '';

        card.innerHTML = `
          ${avatarHtml}
          <div class="text-area">
            <div class="title">${esc(n.title)}</div>
            ${toLineHtml}
            <div class="body">${esc(n.body)}</div>
          </div>
          <div class="actions">
            ${copyBtnHtml}
            <button class="close-btn" data-id="${n.id}">&times;</button>
          </div>
        `;

        card.addEventListener('click', (e) => {
          if (e.target.closest('.close-btn') || e.target.closest('.code-btn')) return;
          openMailAndDismiss(n.id);
        });

        stack.appendChild(card);
      });

      stack.querySelectorAll('.close-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          dismissById(parseInt(btn.dataset.id));
        });
      });

      stack.querySelectorAll('.code-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          copyAndDismiss(parseInt(btn.dataset.id), btn.dataset.code);
        });
      });

      document.getElementById('dismissAll').className = notifications.length > 1 ? 'visible' : '';
    }

    function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function escAttr(s) { return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }

    // ── Add notification ──
    async function addNotification(data) {
      if (!data) return;
      const id = nextId++;
      const kind = data.kind === 'update' ? 'update' : 'mail';
      notifications.push({
        id, title: data.title, body: data.body, code: data.code || null,
        emailId: data.emailId || null, kind,
        accountId: data.accountId || null,
        accountPicture: data.accountPicture || null,
        multiAccount: !!data.multiAccount,
      });
      render();

      const duration = data.duration !== undefined ? data.duration : 5000;
      const bar = document.getElementById('progressBar');
      if (duration === 0) {
        clearGlobalTimer();
        if (bar) bar.style.display = 'none';
      } else {
        if (bar) bar.style.display = 'block';
        extendTimer(duration, kind);
      }

      await resizeWindow();
      await win.show();
    }

    // ── Dismiss one ──
    function dismissById(id) {
      const idx = notifications.findIndex(n => n.id === id);
      if (idx === -1) return;
      notifications.splice(idx, 1);

      if (notifications.length === 0) {
        clearGlobalTimer();
        win.hide();
        return;
      }

      const card = document.querySelector(`.card[data-id="${id}"]`);
      if (card) {
        card.classList.add('removing');
        setTimeout(() => {
          card.remove();
          document.getElementById('dismissAll').className = notifications.length > 1 ? 'visible' : '';
          resizeWindow();
        }, 250);
      } else {
        render();
        resizeWindow();
      }
    }

    // ── Dismiss all ──
    function dismissAll() {
      clearGlobalTimer();
      notifications.length = 0;
      win.hide();
    }

    // ── Open mail + dismiss ──
    function openMailAndDismiss(id) {
      const notification = notifications.find(n => n.id === id);
      if (notification && notification.kind === 'update') {
        invoke('focus_main_window').catch(() => {});
        emitTo('main', 'open-update-settings').catch(() => {});
      } else if (notification && notification.emailId) {
        invoke('focus_main_window').catch(() => {});
        emitTo('main', 'open-notification-mail', { emailId: notification.emailId, accountId: notification.accountId }).catch(() => {});
      } else {
        invoke('focus_main_window').catch(() => {});
        emitTo('main', 'focus-main-window').catch(() => {});
      }
      dismissById(id);
    }

    // ── Copy code + dismiss ──
    function copyAndDismiss(id, code) {
      if (code) writeText(code).catch(() => {});
      dismissById(id);
    }

    document.getElementById('dismissAll').addEventListener('click', dismissAll);

    // ── Init ──
    try {
      const data = await invoke('get_pending_notification');
      if (data) await addNotification(data);
    } catch (e) {
      console.error('[NOTIF] init error:', e);
    }

    listen('new-notification', (event) => {
      addNotification(event.payload);
    });
  </script>
</body>

</html>
